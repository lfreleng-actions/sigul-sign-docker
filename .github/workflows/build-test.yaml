---
# SPDX-License-Identifier: Apache-2.0
# SPDX-FileCopyrightText: 2025 The Linux Foundation

name: 'Sigul Build/Test 🐳'

# yamllint disable-line rule:truthy
on:
  workflow_dispatch:
    inputs:
      clear_cache:
        description: 'Clear all build caches'
        type: boolean
        default: false
        required: false
      enable_auth_debug:
        # Sets SIGUL_DEBUG_AUTH=1 for the integration test stack
        # Surfaces AUTHDBG/* lines in container logs
        description: >-
          Enable verbose auth/handshake logging in bridge & server
        type: boolean
        default: false
        required: false
      publish_ghcr:
        # Publish images to GHCR with a `manual-<sha>` tag.
        description: >-
          Publish images to the GitHub Container Registry
        type: boolean
        default: false
        required: false

  pull_request:
    branches: ['main']
#  push:
#    branches: ['main']

concurrency:
  group: "${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: true

permissions:
  contents: read

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/sigul-docker
  DOCKER_BUILDKIT: '1'
  BUILDKIT_PROGRESS: plain

jobs:
  repository-metadata:
    name: 'Repository Metadata'
    runs-on: 'ubuntu-latest'
    permissions:
      contents: read  # Checkout repository contents
      pull-requests: read  # Gather pull request metadata
    timeout-minutes: 5
    steps:
      # Load the egress allow-list out-of-band from the
      # organisation's .github repository and publish it as
      # $CONNECTION_ALLOW_LIST for the harden-runner step below.
      # yamllint disable-line rule:line-length
      - uses: lfreleng-actions/harden-runner-block-action@6db537b3e6d060c3287c5a3ce2c28b55b0af330d  # v0.2.1
        with:
          config: '@8f4f0cf83e6a015957e83261ed379fd811fc060e'  # v0.5.1

      # Harden the runner with the just-loaded allow-list.
      - name: 'Harden runner (block)'
        # yamllint disable-line rule:line-length
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: 'block'
          allowed-endpoints: >
            ${{ env.CONNECTION_ALLOW_LIST }}

      - name: 'Checkout repository'
        # yamllint disable-line rule:line-length
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: 'Gather repository metadata'
        id: repo-metadata
        # yamllint disable-line rule:line-length
        uses: lfreleng-actions/repository-metadata-action@88b21cb7f6f1772e3a2a4d729451635ca5f5486a  # v0.2.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          github_summary: 'true'
          gerrit_summary: 'false'
          artifact_upload: 'true'
          artifact_formats: 'json'

  ### Build Sigul Client Container ###
  build-containers:
    name: "Build: ${{ matrix.component }} (${{ matrix.platform }})"
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      actions: write  # Required for cache deletion when clear_cache is true
    # Cold builds (no buildx cache hit) compile a stack of dnf updates,
    # ~180 packages from the Fedora repos and a Sigul source build, all
    # of which are IO-bound on the runner.  6 minutes was just enough
    # for warm-cache builds and started timing out reliably once the
    # registry cache importer broke ("connection refused" on localhost).
    # Cap generously - the job is bounded by external repo throughput
    # rather than CPU, so a wider budget costs little but provides
    # headroom against transient mirror slowdowns.
    timeout-minutes: 15
    env:
      GH_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
    strategy:
      fail-fast: false
      matrix:
        # Use ubuntu-latest for AMD64 builds (x86_64 runners)
        # Use ubuntu-24.04-arm for ARM64 builds (native ARM64 runners)
        # This avoids QEMU emulation which can cause timeouts and failures
        # yamllint disable rule:line-length
        include:
          - component: 'client'
            title: 'Sigul Client'
            description: 'Unified Linux Foundation signing infrastructure client'
            platform: 'linux/amd64'
            runner: ubuntu-24.04
          - component: 'client'
            title: 'Sigul Client'
            description: 'Unified Linux Foundation signing infrastructure client'
            platform: 'linux/arm64'
            runner: ubuntu-24.04-arm
          - component: 'server'
            title: 'Sigul Server'
            description: 'Simplified Linux Foundation signing infrastructure server'
            platform: 'linux/amd64'
            runner: ubuntu-24.04
          - component: 'server'
            title: 'Sigul Server'
            description: 'Simplified Linux Foundation signing infrastructure server'
            platform: 'linux/arm64'
            runner: ubuntu-24.04-arm
          - component: 'bridge'
            title: 'Sigul Bridge'
            description: 'Simplified Linux Foundation signing infrastructure bridge'
            platform: 'linux/amd64'
            runner: ubuntu-24.04
          - component: 'bridge'
            title: 'Sigul Bridge'
            description: 'Simplified Linux Foundation signing infrastructure bridge'
            platform: 'linux/arm64'
            runner: ubuntu-24.04-arm
        # yamllint enable rule:line-length
    outputs:
      client-amd64-digest: ${{ steps.build-client-amd64.outputs.digest }}
      client-arm64-digest: ${{ steps.build-client-arm64.outputs.digest }}
      server-amd64-digest: ${{ steps.build-server-amd64.outputs.digest }}
      server-arm64-digest: ${{ steps.build-server-arm64.outputs.digest }}
      bridge-amd64-digest: ${{ steps.build-bridge-amd64.outputs.digest }}
      bridge-arm64-digest: ${{ steps.build-bridge-arm64.outputs.digest }}
    steps:
      # Audit (not block): the image build pulls from Fedora
      # mirrors, PyPI, base-image registries and koji, whose
      # endpoints are too broad/dynamic for the central egress
      # allow-list. The lighter jobs enforce block mode.
      # yamllint disable-line rule:line-length
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: 'audit'

      - name: 'Checkout repository'
        # yamllint disable-line rule:line-length
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - name: 'Set up Docker Buildx'
        # yamllint disable-line rule:line-length
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c  # v4.2.0

      - name: 'Debug cache-clearing input'
        shell: bash
        env:
          CLEAR_CACHE: ${{ github.event.inputs.clear_cache }}
          COND_BOOLEAN: ${{ github.event.inputs.clear_cache == true }}
          COND_STRING: ${{ github.event.inputs.clear_cache == 'true' }}
        # yamllint disable rule:line-length
        run: |
          echo "🔍 Debugging cache-clearing configuration..."
          echo "clear_cache input: '${CLEAR_CACHE}'"
          echo "clear_cache type: $(printf '%s' "${CLEAR_CACHE}" | wc -c) chars"
          echo "Condition evaluation: ${COND_BOOLEAN}"
          echo "Condition (string): ${COND_STRING}"
        # yamllint enable rule:line-length

      - name: 'Clear build caches if requested'
        if: ${{ github.event.inputs.clear_cache == 'true' }}
        run: |
          echo "🧹 Clearing all build caches..."

          # Clear Docker BuildKit cache
          docker buildx prune --all --force || true

          # Clear GitHub Actions cache
          gh cache list | cut -f1 | xargs -I {} gh cache delete {} || true

          echo "✅ All caches cleared"

      - name: 'Extract platform identifier'
        id: platform
        shell: bash
        env:
          MATRIX_PLATFORM: ${{ matrix.platform }}
        run: |
          platform_id="${MATRIX_PLATFORM}"
          platform_id="${platform_id//\//-}"
          echo "id=${platform_id}" >> "$GITHUB_OUTPUT"
          echo "Platform ID: ${platform_id}"

      # Generate the full standard OCI label set from the workflow
      # context (org/repo, commit SHA, build time, repo licence, etc).
      # Per-component title and description come from the matrix.
      # The resulting labels are baked into the image at build time
      # and survive the tar export/load cycle that publish-ghcr uses.
      - name: 'Compute OCI image metadata'
        id: meta
        # yamllint disable-line rule:line-length
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9  # v6.1.0
        with:
          images: ghcr.io/${{ github.repository }}/${{ matrix.component }}
          # Pin image.version explicitly to the tag the publish-ghcr
          # job below will use (manual-<sha>). Without this override,
          # docker/metadata-action would derive image.version from the
          # ref (branch name on workflow_dispatch / push), which would
          # not match the actual published tag.
          labels: |
            org.opencontainers.image.title=${{ matrix.title }}
            org.opencontainers.image.description=${{ matrix.description }}
            org.opencontainers.image.version=manual-${{ github.sha }}

      # yamllint disable rule:line-length
      - name: "Build ${{ matrix.component }} container for ${{ matrix.platform }}"
        # yamllint disable-line rule:line-length
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a  # v7.3.0
        id: docker-build
        with:
          context: .
          file: Dockerfile.${{ matrix.component }}
          # The former pseudo-ternary here
          # (runner == arm && '' || matrix.platform) always evaluated
          # to matrix.platform because the empty string is falsy, so
          # reference matrix.platform directly (identical behaviour).
          platforms: ${{ matrix.platform }}
          # Local-only build tag. The publish-ghcr job below applies
          # the manual-<sha> tag if a maintainer opts into
          # publishing.
          tags: |
            ${{ matrix.component }}:${{ steps.platform.outputs.id }}
          labels: ${{ steps.meta.outputs.labels }}
          outputs: |
            type=docker,dest=/tmp/${{ matrix.component }}-${{ steps.platform.outputs.id }}.tar
          push: false
          cache-from: ${{ github.event.inputs.clear_cache == 'true' && 'type=registry,ref=localhost/null' || format('type=gha,scope={0}-{1}-{2}', matrix.component, matrix.platform, matrix.runner) }}
          cache-to: type=gha,mode=max,scope=${{ matrix.component }}-${{ matrix.platform }}-${{ matrix.runner }}

      - name: 'Set build outputs for client amd64'
        id: build-client-amd64
        if: matrix.component == 'client' && matrix.platform == 'linux/amd64'
        env:
          DIGEST: ${{ steps.docker-build.outputs.digest }}
        run: |
          echo "digest=${DIGEST}" >> "$GITHUB_OUTPUT"

      - name: 'Set build outputs for client arm64'
        id: build-client-arm64
        if: matrix.component == 'client' && matrix.platform == 'linux/arm64'
        env:
          DIGEST: ${{ steps.docker-build.outputs.digest }}
        run: |
          echo "digest=${DIGEST}" >> "$GITHUB_OUTPUT"

      - name: 'Set build outputs for server amd64'
        id: build-server-amd64
        if: matrix.component == 'server' && matrix.platform == 'linux/amd64'
        env:
          DIGEST: ${{ steps.docker-build.outputs.digest }}
        run: |
          echo "digest=${DIGEST}" >> "$GITHUB_OUTPUT"

      - name: 'Set build outputs for server arm64'
        id: build-server-arm64
        if: matrix.component == 'server' && matrix.platform == 'linux/arm64'
        env:
          DIGEST: ${{ steps.docker-build.outputs.digest }}
        run: |
          echo "digest=${DIGEST}" >> "$GITHUB_OUTPUT"

      - name: 'Set build outputs for bridge amd64'
        id: build-bridge-amd64
        if: matrix.component == 'bridge' && matrix.platform == 'linux/amd64'
        env:
          DIGEST: ${{ steps.docker-build.outputs.digest }}
        run: |
          echo "digest=${DIGEST}" >> "$GITHUB_OUTPUT"

      - name: 'Set build outputs for bridge arm64'
        id: build-bridge-arm64
        if: matrix.component == 'bridge' && matrix.platform == 'linux/arm64'
        env:
          DIGEST: ${{ steps.docker-build.outputs.digest }}
        run: |
          echo "digest=${DIGEST}" >> "$GITHUB_OUTPUT"

      - name: 'Upload ${{ matrix.component }} image as artifact'
        # yamllint disable-line rule:line-length
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        if: success()
        with:
          name: ${{ matrix.component }}-${{ steps.platform.outputs.id }}-image
          path: /tmp/${{ matrix.component }}-${{ steps.platform.outputs.id }}.tar
          retention-days: 7
      # yamllint enable rule:line-length

  publish-ghcr:
    name: 'Publish: ${{ matrix.component }}'
    runs-on: 'ubuntu-latest'
    permissions:
      contents: read  # Checkout repository contents
      packages: write  # Push container images to GHCR
    timeout-minutes: 10
    needs: [build-containers]
    # Pull-request triggers never publish.  workflow_dispatch only
    # publishes when the maintainer explicitly ticks publish_ghcr
    # (default: false). Tagged releases go through release.yaml,
    # which is the only path that ever applies semver / `latest`
    # tags; this job only ever applies a `manual-<sha>` tag.
    if: >-
      github.event_name == 'workflow_dispatch'
      && inputs.publish_ghcr
    strategy:
      fail-fast: false
      matrix:
        component: ['client', 'server', 'bridge']
    steps:
      # Load the egress allow-list out-of-band from the
      # organisation's .github repository and publish it as
      # $CONNECTION_ALLOW_LIST for the harden-runner step below.
      # yamllint disable-line rule:line-length
      - uses: lfreleng-actions/harden-runner-block-action@6db537b3e6d060c3287c5a3ce2c28b55b0af330d  # v0.2.1
        with:
          config: '@8f4f0cf83e6a015957e83261ed379fd811fc060e'  # v0.5.1

      # Harden the runner with the just-loaded allow-list.
      - name: 'Harden runner (block)'
        # yamllint disable-line rule:line-length
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: 'block'
          allowed-endpoints: >
            ${{ env.CONNECTION_ALLOW_LIST }}

      - name: 'Checkout repository'
        # yamllint disable-line rule:line-length
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - name: 'Set up Docker Buildx'
        # yamllint disable-line rule:line-length
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c  # v4.2.0

      - name: 'Log in to GitHub Container Registry'
        # yamllint disable-line rule:line-length
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0  # v4.4.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 'Download AMD64 image artifact'
        # yamllint disable-line rule:line-length
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: ${{ matrix.component }}-linux-amd64-image
          path: /tmp

      - name: 'Download ARM64 image artifact'
        # yamllint disable-line rule:line-length
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: ${{ matrix.component }}-linux-arm64-image
          path: /tmp

      - name: 'Load platform images'
        shell: bash
        env:
          COMPONENT: ${{ matrix.component }}
        run: |
          set -euo pipefail
          docker load --input "/tmp/${COMPONENT}-linux-amd64.tar"
          docker load --input "/tmp/${COMPONENT}-linux-arm64.tar"
          docker images | grep "^${COMPONENT} " || true

      # yamllint disable rule:line-length
      - name: 'Push images and create multi-arch manifest'
        shell: bash
        env:
          COMPONENT: ${{ matrix.component }}
          IMAGE: ${{ env.REGISTRY }}/${{ github.repository }}/${{ matrix.component }}
          TAG: manual-${{ github.sha }}
        run: |
          set -euo pipefail

          # Per-arch images
          docker tag "${COMPONENT}:linux-amd64" "${IMAGE}:${TAG}-amd64"
          docker tag "${COMPONENT}:linux-arm64" "${IMAGE}:${TAG}-arm64"
          docker push "${IMAGE}:${TAG}-amd64"
          docker push "${IMAGE}:${TAG}-arm64"

          # Multi-arch manifest
          docker manifest create "${IMAGE}:${TAG}" \
              "${IMAGE}:${TAG}-amd64" "${IMAGE}:${TAG}-arm64"
          docker manifest annotate "${IMAGE}:${TAG}" "${IMAGE}:${TAG}-amd64" \
              --arch amd64 --os linux
          docker manifest annotate "${IMAGE}:${TAG}" "${IMAGE}:${TAG}-arm64" \
              --arch arm64 --os linux
          docker manifest push "${IMAGE}:${TAG}"
          echo "✅ Published multi-arch manifest: ${IMAGE}:${TAG}"

      - name: 'Verify pushed manifest'
        shell: bash
        env:
          IMAGE: ${{ env.REGISTRY }}/${{ github.repository }}/${{ matrix.component }}
          TAG: manual-${{ github.sha }}
        run: docker manifest inspect "${IMAGE}:${TAG}"
      # yamllint enable rule:line-length

  ### PR SBOM generation ###
  #
  # Generates the SPDX SBOM from the locally-loaded amd64 image and
  # uploads it as an artifact. Split from the Grype audit (pr-grype)
  # so SBOM generation and the vulnerability policy gate fail
  # independently, mirroring release.yaml. AMD64 only: Anchore's
  # SBOM action against a multi-arch manifest scans the host-platform
  # variant, so the release workflow effectively scans amd64 too.
  # Scanning both arches on PR would double runtime for marginal
  # additional CVE coverage (CVEs at the OS-package layer are nearly
  # always arch-agnostic).
  pr-sbom:
    name: 'SBOM: ${{ matrix.component }}'
    needs: [build-containers]
    runs-on: 'ubuntu-latest'
    permissions:
      contents: read
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        component: ['client', 'server', 'bridge']
    steps:
      # Load the egress allow-list out-of-band from the
      # organisation's .github repository and publish it as
      # $CONNECTION_ALLOW_LIST for the harden-runner step below.
      # yamllint disable-line rule:line-length
      - uses: lfreleng-actions/harden-runner-block-action@6db537b3e6d060c3287c5a3ce2c28b55b0af330d  # v0.2.1
        with:
          config: '@8f4f0cf83e6a015957e83261ed379fd811fc060e'  # v0.5.1

      # Harden the runner with the just-loaded allow-list.
      - name: 'Harden runner (block)'
        # yamllint disable-line rule:line-length
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: 'block'
          allowed-endpoints: >
            ${{ env.CONNECTION_ALLOW_LIST }}

      - name: 'Download AMD64 image artifact'
        # yamllint disable-line rule:line-length
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: ${{ matrix.component }}-linux-amd64-image
          path: /tmp

      - name: 'Load image into Docker'
        shell: bash
        env:
          COMPONENT: ${{ matrix.component }}
        run: |
          set -euo pipefail
          docker load --input "/tmp/${COMPONENT}-linux-amd64.tar"
          docker images "${COMPONENT}:linux-amd64"

      - name: 'Generate SPDX SBOM'
        # yamllint disable-line rule:line-length
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610  # v0.24.0
        with:
          image: ${{ matrix.component }}:linux-amd64
          format: spdx-json
          output-file: sbom-${{ matrix.component }}.spdx.json
          # The SBOM action's own artifact upload duplicates the
          # explicit upload-artifact step below; disabling it
          # keeps all assets under one consistent naming pattern.
          upload-artifact: false

      - name: 'Upload SBOM artifact'
        # Consumed by the pr-grype job below as the single source of
        # truth for the scan.
        # yamllint disable-line rule:line-length
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: pr-sbom-${{ matrix.component }}
          path: sbom-${{ matrix.component }}.spdx.json
          retention-days: 14
          if-no-files-found: error

      - name: 'SBOM summary'
        shell: bash
        env:
          COMPONENT: ${{ matrix.component }}
        run: |
          set -euo pipefail
          sbom_file="sbom-${COMPONENT}.spdx.json"
          {
            echo "## SBOM: ${COMPONENT}"
            echo ""
            if [[ ! -f "${sbom_file}" ]]; then
              echo "No SBOM produced."
              exit 0
            fi
            pkg_count=$(jq '[.packages[]?] | length' "${sbom_file}")
            echo "SPDX package count: ${pkg_count}"
          } >> "$GITHUB_STEP_SUMMARY"

  ### PR vulnerability scan (Grype) ###
  #
  # Audits the SBOM produced by pr-sbom. Kept separate from SBOM
  # generation so the vulnerability policy gate fails independently,
  # mirroring release.yaml. Set the NO_BLOCK_AUDIT_FAIL repository
  # variable to 'true' to soft-fail when a transitive CVE in a
  # third-party dependency is unavoidable; the SARIF and
  # step-summary report still publishes.
  pr-grype:
    name: 'Grype: ${{ matrix.component }}'
    needs: [pr-sbom]
    # pr-sbom is a matrix job: a single failed component leg marks
    # the whole pr-sbom job 'failure', which would otherwise skip
    # pr-grype entirely and deny SARIF/reports for the components
    # whose SBOMs built fine. Run whenever pr-sbom actually executed
    # (not skipped / cancelled). The per-component download-artifact
    # step still fails the leg for any missing SBOM, so a real SBOM
    # failure keeps pr-grype's overall result 'failure'.
    if: >-
      !cancelled() && needs.pr-sbom.result != 'skipped'
      && needs.pr-sbom.result != 'cancelled'
    runs-on: 'ubuntu-latest'
    permissions:
      contents: read
      # github/codeql-action/upload-sarif publishes Grype findings
      # to the repository's code-scanning alerts. On PRs from forks
      # this scope is silently downgraded to read; the upload step
      # is wrapped in continue-on-error so the scan still produces
      # the downloadable SARIF artifact in that case.
      security-events: write  # Upload Grype SARIF to code scanning
    timeout-minutes: 15
    strategy:
      # Don't short-circuit other components if one's Grype scan
      # finds CVEs at the configured threshold; we want SARIF for
      # every component in a single PR run.
      fail-fast: false
      matrix:
        component: ['client', 'server', 'bridge']
    env:
      # 'low' matches release.yaml so PR feedback and release
      # gating use the same severity bar. Set the
      # NO_BLOCK_AUDIT_FAIL repository variable to 'true' to
      # soft-fail when a transitive CVE in a third-party
      # dependency is unavoidable; the SARIF and step-summary
      # report still publishes.
      GRYPE_FAIL_ON: 'low'
    steps:
      # Load the egress allow-list out-of-band from the
      # organisation's .github repository and publish it as
      # $CONNECTION_ALLOW_LIST for the harden-runner step below.
      # yamllint disable-line rule:line-length
      - uses: lfreleng-actions/harden-runner-block-action@6db537b3e6d060c3287c5a3ce2c28b55b0af330d  # v0.2.1
        with:
          config: '@8f4f0cf83e6a015957e83261ed379fd811fc060e'  # v0.5.1

      # Harden the runner with the just-loaded allow-list.
      - name: 'Harden runner (block)'
        # yamllint disable-line rule:line-length
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: 'block'
          allowed-endpoints: >
            ${{ env.CONNECTION_ALLOW_LIST }}

      - name: 'Download SBOM artifact'
        # yamllint disable-line rule:line-length
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: pr-sbom-${{ matrix.component }}

      - name: 'Install Grype'
        id: grype
        # yamllint disable-line rule:line-length
        uses: anchore/scan-action/download-grype@e1165082ffb1fe366ebaf02d8526e7c4989ea9d2  # v7.4.0
        with:
          cache-db: 'true'

      - name: 'Grype scan SBOM'
        id: grype-scan
        env:
          GRYPE_CMD: ${{ steps.grype.outputs.cmd }}
          COMPONENT: ${{ matrix.component }}
          FAIL_ON: ${{ env.GRYPE_FAIL_ON }}
          NO_BLOCK_AUDIT_FAIL: >-
            ${{ vars.NO_BLOCK_AUDIT_FAIL == 'true' }}
        run: |
          set +e
          "${GRYPE_CMD}" \
            -o "sarif=grype-${COMPONENT}.sarif" \
            -o "json=grype-${COMPONENT}.json" \
            -o "table=grype-${COMPONENT}.txt" \
            --fail-on "${FAIL_ON}" \
            "sbom:sbom-${COMPONENT}.spdx.json"
          grype_exit=$?
          set -e

          echo "--- Grype scan results (${COMPONENT}) ---"
          if [[ -f "grype-${COMPONENT}.txt" ]]; then
            cat "grype-${COMPONENT}.txt"
          else
            echo "No table output produced"
          fi

          # Grype exits 2 when matches at/above --fail-on were
          # found. Any other non-zero exit means grype itself
          # failed and we must surface that.
          if [[ "${grype_exit}" == "0" ]]; then
            echo "No vulnerabilities at or above '${FAIL_ON}'"
            exit 0
          fi
          if [[ "${grype_exit}" != "2" ]]; then
            echo "::error::Grype exited with code ${grype_exit}"
            exit "${grype_exit}"
          fi

          if [[ "${NO_BLOCK_AUDIT_FAIL}" == "true" ]]; then
            echo "::warning::${COMPONENT}: Grype found findings" \
              "at or above '${FAIL_ON}', but NO_BLOCK_AUDIT_FAIL" \
              "is set so the PR check will pass."
            exit 0
          fi
          echo "::error::${COMPONENT}: Grype found vulnerabilities" \
            "at or above '${FAIL_ON}'. See the table above."
          exit 1

      - name: 'Upload Grype SARIF to code scanning'
        if: always()
        # continue-on-error: PRs from forks have security-events
        # downgraded to read-only, in which case this step would
        # otherwise fail the matrix entry even on a successful
        # scan. The SARIF file is still attached to the workflow
        # run as an artifact below for reviewer inspection.
        continue-on-error: true
        # yamllint disable-line rule:line-length
        uses: github/codeql-action/upload-sarif@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a  # v4.36.3
        with:
          sarif_file: grype-${{ matrix.component }}.sarif
          # Distinct category from release.yaml's 'grype-<component>'
          # so PR-time findings are tracked separately from the
          # main-branch / released-image alert stream.
          category: pr-grype-${{ matrix.component }}

      - name: 'Upload SBOM and Grype reports as workflow artifact'
        if: always()
        # yamllint disable-line rule:line-length
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: pr-sbom-and-scan-${{ matrix.component }}
          path: |
            sbom-${{ matrix.component }}.spdx.json
            grype-${{ matrix.component }}.sarif
            grype-${{ matrix.component }}.json
            grype-${{ matrix.component }}.txt
          # Shorter retention than the release workflow's 90 days:
          # PR-run reports are review-time signal, not a release
          # record.
          retention-days: 14
          if-no-files-found: warn

      - name: 'Grype Markdown summary'
        if: always()
        env:
          COMPONENT: ${{ matrix.component }}
        run: |
          # Render a Markdown table of Grype matches into the job
          # step summary so reviewers see findings without leaving
          # the workflow run. CVE data is sourced from the JSON
          # output (jq-parsed so multi-word cells cannot break the
          # table column layout).
          json_file="grype-${COMPONENT}.json"
          {
            echo "## Grype scan: ${COMPONENT}"
            echo ""
            if [[ ! -f "${json_file}" ]]; then
              echo "No scan results available."
              exit 0
            fi
            match_count=$(jq '.matches | length' "${json_file}")
            if [[ "${match_count}" == "0" ]]; then
              echo "No vulnerabilities at or above the configured" \
                "severity threshold."
              exit 0
            fi
            echo "Found ${match_count} Grype record(s)."
            echo ""
            echo "| Package | Installed | Fixed In | Type |" \
              "Vulnerability | Severity | EPSS | Risk |"
            echo "| --- | --- | --- | --- | --- | --- | --- | --- |"
            jq -r '
              def esc: tostring | gsub("\\|"; "\\|");
              def round2: (. * 100 | round) / 100;
              def epss_pct:
                ( .vulnerability.epss // [] ) as $e
                | if ($e | length) == 0 then "-"
                  else ( $e[0].epss // 0 ) as $p
                    | if $p == 0 then "0%"
                      elif ($p * 100) < 0.01 then "<0.01%"
                      else ( ($p * 100) | round2 | tostring
                             + "%" ) end
                  end;
              def risk_fmt:
                .vulnerability.risk
                | if . == null then "-"
                  elif type == "number" then
                    (round2 | tostring)
                  else (. | tostring) end;
              .matches[] |
              [ (.artifact.name // "-" | esc),
                (.artifact.version // "-" | esc),
                ( ( .vulnerability.fix.versions // [] )
                  | if length == 0 then "-"
                    else join(", ") end | esc ),
                (.artifact.type // "-" | esc),
                (.vulnerability.id // "-" | esc),
                (.vulnerability.severity // "-" | esc),
                epss_pct,
                risk_fmt
              ] | "| " + join(" | ") + " |"
            ' "${json_file}"
          } >> "$GITHUB_STEP_SUMMARY"

  ### Functional Tests ###
  functional-tests:
    name: 'Tests: ${{ matrix.platform }}'
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
    # Functional tests bring up a fresh stack, run integration
    # tests, and run the full signing suite.  Local arm64 takes
    # ~90s but CI Linux runners need more headroom for the cold
    # rpmbuild + sqlite rpmdb init + 64 MiB binary streaming
    # test, plus per-step Docker pulls.  5 minutes was hitting
    # the cap mid-suite and triggering 'operation was canceled'.
    timeout-minutes: 15
    needs: build-containers
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
    steps:
      # Audit (not block): this job deploys the Sigul stack and
      # pulls container images at runtime, whose endpoints are too
      # broad/dynamic for the central egress allow-list. The
      # lighter jobs enforce block mode.
      # yamllint disable-line rule:line-length
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: 'audit'

      - name: 'Checkout repository'
        # yamllint disable-line rule:line-length
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - name: 'Set up Docker Buildx'
        # yamllint disable-line rule:line-length
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c  # v4.2.0

      - name: 'Detect runner architecture'
        id: runner-arch
        shell: bash
        run: |
          # Detect the runner architecture
          ARCH=$(uname -m)
          case $ARCH in
            x86_64)
              PLATFORM_ID="linux-amd64"
              DOCKER_PLATFORM="linux/amd64"
              ;;
            aarch64|arm64)
              PLATFORM_ID="linux-arm64"
              DOCKER_PLATFORM="linux/arm64"
              ;;
            *)
              echo "❌ Unsupported architecture: $ARCH"
              exit 1
              ;;
          esac
          echo "platform-id=${PLATFORM_ID}" >> "$GITHUB_OUTPUT"
          echo "docker-platform=${DOCKER_PLATFORM}" >> "$GITHUB_OUTPUT"
          echo "📍 Detected runner architecture: $ARCH -> $PLATFORM_ID"

      - name: 'Download Sigul Client image artifact'
        # yamllint disable-line rule:line-length
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: 'client-${{ steps.runner-arch.outputs.platform-id }}-image'
          path: /tmp

      - name: 'Download Sigul Server image artifact'
        # yamllint disable-line rule:line-length
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: >-
            server-${{ steps.runner-arch.outputs.platform-id }}-image
          path: /tmp

      - name: 'Download Sigul Bridge image artifact'
        # yamllint disable-line rule:line-length
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: >-
            bridge-${{ steps.runner-arch.outputs.platform-id }}-image
          path: /tmp

      - name: 'Load and tag container images'
        shell: bash
        env:
          PLATFORM_ID: ${{ steps.runner-arch.outputs.platform-id }}
        run: |
          # Loading/tagging container images
          echo "🔧 Loading/tagging ${PLATFORM_ID} container images for" \
            "functional tests"

          # Load sigul-client image
          CLIENT_IMAGE_FILE="/tmp/client-${PLATFORM_ID}.tar"
          if [ -f "${CLIENT_IMAGE_FILE}" ]; then
            echo "Loading Sigul client image for ${PLATFORM_ID}..."
            docker load --input "${CLIENT_IMAGE_FILE}"
            docker tag "client:${PLATFORM_ID}" \
              "client-${PLATFORM_ID}-image:test"
            echo "✅ Sigul client image loaded and tagged"
          else
            echo "❌ Sigul client image not found: ${CLIENT_IMAGE_FILE}"
            exit 1
          fi

          # Load server image
          SERVER_IMAGE_FILE="/tmp/server-${PLATFORM_ID}.tar"
          if [ -f "${SERVER_IMAGE_FILE}" ]; then
            echo "Loading server image for ${PLATFORM_ID}..."
            docker load --input "${SERVER_IMAGE_FILE}"
            docker tag "server:${PLATFORM_ID}" \
              "server-${PLATFORM_ID}-image:test"
            echo "✅ Sigul server image loaded and tagged"
          else
            echo "❌ Sigul server image not found: ${SERVER_IMAGE_FILE}"
            exit 1
          fi

          # Load bridge image
          BRIDGE_IMAGE_FILE="/tmp/bridge-${PLATFORM_ID}.tar"
          if [ -f "${BRIDGE_IMAGE_FILE}" ]; then
            echo "Loading bridge image for ${PLATFORM_ID}..."
            docker load --input "${BRIDGE_IMAGE_FILE}"
            docker tag "bridge:${PLATFORM_ID}" \
              "bridge-${PLATFORM_ID}-image:test"
            echo "✅ Sigul bridge image loaded and tagged"
          else
            echo "❌ Sigul bridge image not found: ${BRIDGE_IMAGE_FILE}"
            exit 1
          fi

          echo "✅ All Sigul images loaded successfully for functional tests"

      - name: 'Deploy fresh Sigul infrastructure for functional tests'
        shell: bash
        env:
          SIGUL_PLATFORM_ID: ${{ steps.runner-arch.outputs.platform-id }}
          DOCKER_PLATFORM: ${{ steps.runner-arch.outputs.docker-platform }}
          # When enable_auth_debug=true, the bridge and server pick this
          # up via docker-compose.sigul.yml and emit AUTHDBG/* lines
          # gated by patches/02-verbose-auth-logging.patch.
          SIGUL_DEBUG_AUTH: ${{ inputs.enable_auth_debug && '1' || '0' }}
        run: |
          PLATFORM="${SIGUL_PLATFORM_ID}"
          echo "🚀 Deploying fresh Sigul infrastructure for functional tests"
          echo "📦 Platform: ${PLATFORM} (${DOCKER_PLATFORM})"
          echo "🔍 SIGUL_DEBUG_AUTH=${SIGUL_DEBUG_AUTH}"

          # Export platform info for the deployment script
          export SIGUL_RUNNER_PLATFORM="${SIGUL_PLATFORM_ID}"
          export SIGUL_DOCKER_PLATFORM="${DOCKER_PLATFORM}"

          # Use the unified deployment script to deploy fresh stack
          DEPLOY_SCRIPT="scripts/deploy-sigul-infrastructure.sh"
          chmod +x "${DEPLOY_SCRIPT}"
          "./${DEPLOY_SCRIPT}" --verbose

          echo "✅ Fresh Sigul infrastructure deployed for functional tests"

      - name: 'Validate NSS certificates in containers'
        shell: bash
        run: |
          echo '🔍 Validating NSS certificates inside containers...'

          # Debug: Show all running containers
          echo "📋 Current container status:"
          docker ps --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}"

          # Check that containers are running and healthy
          BRIDGE_STATUS=$(docker ps --filter "name=sigul-bridge" \
            --format "{{.Status}}" || echo "not found")
          SERVER_STATUS=$(docker ps --filter "name=sigul-server" \
            --format "{{.Status}}" || echo "not found")

          echo "🔍 Container status check:"
          echo "  Bridge: $BRIDGE_STATUS"
          echo "  Server: $SERVER_STATUS"

          if ! docker ps --format "{{.Names}}" | grep -q "^sigul-bridge$"; then
            echo "❌ sigul-bridge container not running (status: $BRIDGE_STATUS)"
            echo "📋 All containers:"
            docker ps -a --format "table {{.Names}}\t{{.Status}}\t{{.Image}}"
            echo "📋 Bridge container logs:"
            docker logs sigul-bridge 2>&1 | tail -20 || echo "No logs available"
            exit 1
          fi

          if ! docker ps --format "{{.Names}}" | grep -q "^sigul-server$"; then
            echo "❌ sigul-server container not running (status: $SERVER_STATUS)"
            echo "📋 All containers:"
            docker ps -a --format "table {{.Names}}\t{{.Status}}\t{{.Image}}"
            echo "📋 Server container logs:"
            docker logs sigul-server 2>&1 | tail -20 || echo "No logs available"
            exit 1
          fi

          # Validate NSS certificates inside the bridge container
          echo "🔍 Validating bridge NSS certificates..."
          if docker exec -e NSS_DIR=/etc/pki/sigul sigul-bridge \
            /usr/local/bin/validate-nss.sh bridge; then
            echo "✅ Bridge NSS validation passed"
          else
            echo "❌ Bridge NSS validation failed"
            exit 1
          fi

          # Validate NSS certificates inside the server container
          echo "🔍 Validating server NSS certificates..."
          if docker exec -e NSS_DIR=/etc/pki/sigul sigul-server \
            /usr/local/bin/validate-nss.sh server; then
            echo "✅ Server NSS validation passed"
          else
            echo "❌ Server NSS validation failed"
            exit 1
          fi

          echo "✅ All NSS certificate validations passed"

      - name: 'Verify patch is applied in bridge image'
        shell: bash
        # yamllint disable rule:line-length
        run: |
          echo '🔍 Verifying double-TLS patch is applied in bridge...'

          # Check for the CRITICAL FIX comment
          if ! docker exec sigul-bridge grep -q "CRITICAL FIX" \
               /usr/share/sigul/bridge.py; then
            echo "❌ ERROR: CRITICAL FIX comment not found in bridge.py!"
            echo "Bridge may be using unpatched upstream code"
            exit 1
          fi

          # Check for the actual patched code: server_sock.force_handshake()
          if ! docker exec sigul-bridge grep -q "server_sock.force_handshake()" \
               /usr/share/sigul/bridge.py; then
            echo "❌ ERROR: server_sock.force_handshake() call not found!"
            echo "The patch may not be fully applied"
            exit 1
          fi

          # Check it's in the right location (after accept, before client conn)
          if docker exec sigul-bridge grep -B10 -A10 "server_sock.force_handshake()" \
             /usr/share/sigul/bridge.py | grep -q "accept()"; then
            echo "✅ Double-TLS handshake patch verified in bridge"
            echo ""
            echo "Patched code location confirmed:"
            docker exec sigul-bridge grep -B5 -A10 "server_sock.force_handshake()" \
              /usr/share/sigul/bridge.py | sed 's/^/  /'
          else
            echo "❌ ERROR: server_sock.force_handshake() not in correct location!"
            echo "Expected after accept() call but before client connection"
            echo ""
            echo "Showing context around force_handshake():"
            docker exec sigul-bridge grep -B10 -A10 "server_sock.force_handshake()" \
              /usr/share/sigul/bridge.py | sed 's/^/  /'
            exit 1
          fi
        # yamllint enable rule:line-length

      - name: 'Setup client for integration tests'
        shell: bash
        env:
          SIGUL_CLIENT_IMAGE: >-
            client-${{
              steps.runner-arch.outputs.platform-id
            }}-image:test
        run: |
          echo '🔧 Setting up client container for integration tests...'

          # Detect network name
          NETWORK_NAME=$(docker network ls --filter "name=sigul" \
            --format "{{.Name}}" | head -1)
          echo "Using network: ${NETWORK_NAME}"

          # Create client volumes if they don't exist
          docker volume create sigul-docker_sigul_client_nss || true
          docker volume create sigul-docker_sigul_client_config || true

          # Set proper ownership on client volumes (UID 1000 = sigul user)
          docker run --rm \
            -v sigul-docker_sigul_client_nss:/target-nss \
            -v sigul-docker_sigul_client_config:/target-config \
            alpine:3.19 \
            sh -c 'chown -R 1000:1000 /target-nss /target-config'

          # Get bridge NSS volume for certificate import
          BRIDGE_NSS_VOLUME=$(docker volume ls --format "{{.Name}}" \
            | grep -E "bridge.*nss|sigul.*bridge.*nss" | head -1)
          echo "Bridge NSS volume: ${BRIDGE_NSS_VOLUME}"

          # Get ephemeral NSS password
          NSS_PASSWORD=$(cat test-artifacts/nss-password)

          # Start temporary client container for initialization
          docker run -d --name sigul-client-init \
            --network "${NETWORK_NAME}" \
            --user sigul \
            -v "${BRIDGE_NSS_VOLUME}":/etc/pki/sigul/bridge:ro \
            -v sigul-docker_sigul_client_nss:/etc/pki/sigul/client:rw \
            -v sigul-docker_sigul_client_config:/etc/sigul:rw \
            -e NSS_PASSWORD="${NSS_PASSWORD}" \
            "${SIGUL_CLIENT_IMAGE}" \
            tail -f /dev/null

          # Wait for container to be ready
          sleep 3

          # Initialize client certificates
          echo "Initializing client certificates..."
          docker exec sigul-client-init /usr/local/bin/init-client-certs.sh

          # Generate client configuration
          docker exec --user root sigul-client-init bash -c \
            'cat > /etc/sigul/client.conf << "EOFCONFIG"
          [client]
          bridge-hostname: sigul-bridge.example.org
          bridge-port: 44334
          server-hostname: sigul-server.example.org
          # Default identity for batch-mode requests.  Without this,
          # sigul falls back to getpass.getuser() inside the client
          # container - that resolves to the sigul user, which is not
          # the admin user we created in the server database, so
          # every request would fail AUTHENTICATION_FAILED.
          user-name: admin

          [gnupg]
          gnupg-bin: /usr/bin/gpg2
          gnupg-key-type: RSA
          gnupg-key-length: 4096

          [nss]
          client-cert-nickname: sigul-client-cert
          nss-ca-cert-nickname: sigul-ca
          nss-bridge-cert-nickname: sigul-bridge-cert
          nss-dir: /etc/pki/sigul/client
          nss-password: '"${NSS_PASSWORD}"'
          nss-min-tls: tls1.2
          EOFCONFIG
          '

          # Set proper ownership
          docker exec --user root sigul-client-init \
            chown sigul:sigul /etc/sigul/client.conf

          # Stop and remove init container
          docker stop sigul-client-init
          docker rm sigul-client-init

          echo "✅ Client setup complete"

      - name: 'Run integration tests'
        shell: bash
        env:
          SIGUL_CLIENT_IMAGE: >-
            client-${{
              steps.runner-arch.outputs.platform-id
            }}-image:test
          SIGUL_SERVER_IMAGE: >-
            server-${{
              steps.runner-arch.outputs.platform-id
            }}-image:test
          SIGUL_BRIDGE_IMAGE: >-
            bridge-${{
              steps.runner-arch.outputs.platform-id
            }}-image:test
        run: |
          echo 'Running Sigul integration tests against fresh infrastructure...'
          chmod +x scripts/run-integration-tests.sh
          ./scripts/run-integration-tests.sh --verbose

      - name: 'Run signing tests'
        shell: bash
        env:
          SIGUL_CLIENT_IMAGE: >-
            client-${{
              steps.runner-arch.outputs.platform-id
            }}-image:test
          SIGUL_SERVER_IMAGE: >-
            server-${{
              steps.runner-arch.outputs.platform-id
            }}-image:test
          SIGUL_BRIDGE_IMAGE: >-
            bridge-${{
              steps.runner-arch.outputs.platform-id
            }}-image:test
        run: |
          # Drive every supported sigul signing operation through the
          # live stack and verify each output with the upstream tool
          # that would consume it in production (gpg, rpm, ...).
          # Every command and its raw output is shown below in the log
          # so a human reading the workflow output can copy-paste any
          # invocation to reproduce a failure.
          chmod +x scripts/run-signing-tests.sh
          ./scripts/run-signing-tests.sh

      - name: 'Capture Sigul daemon logs and container diagnostics'
        if: always()
        shell: bash
        run: |
          # Sigul writes its real log to /var/log/sigul_<role>.log
          # *inside* the container - that path is not on a persisted
          # volume, so 'docker logs' only shows the entrypoint output
          # and AUTHDBG/* lines disappear when the container exits.
          # docker cp works against running and stopped containers,
          # so capture the daemon log files into test-artifacts/.
          mkdir -p test-artifacts/sigul-logs
          for container in sigul-server sigul-bridge; do
            if docker ps -a --format '{{.Names}}' \
                | grep -q "^${container}$"; then
              role="${container#sigul-}"  # 'server' or 'bridge'
              echo "Collecting /var/log/sigul_${role}.log from ${container}"
              docker cp \
                "${container}:/var/log/sigul_${role}.log" \
                "test-artifacts/sigul-logs/${container}.sigul.log" \
                2>/dev/null \
                || echo "(no /var/log/sigul_${role}.log)" \
                   > "test-artifacts/sigul-logs/${container}.sigul.log"
              docker logs "${container}" \
                > "test-artifacts/sigul-logs/${container}.docker.log" \
                2>&1 || true
              docker inspect "${container}" \
                > "test-artifacts/sigul-logs/${container}.inspect.json" \
                2>/dev/null || true
            fi
          done
          echo "Captured Sigul daemon logs:"
          ls -la test-artifacts/sigul-logs/ || true

      - name: 'Upload integration test artifacts'
        # yamllint disable-line rule:line-length
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        if: always()
        with:
          name: >-
            integration-test-results-${{
              steps.runner-arch.outputs.platform-id
            }}
          path: |
            test-artifacts/
            *.txt
            *.asc
            *.rpm
          retention-days: 7

      - name: 'Clean up functional test infrastructure'
        if: always()
        shell: bash
        run: |
          echo "🧹 Cleaning up functional test infrastructure..."

          # Stop and remove containers from functional tests
          containers_to_cleanup=(
            "sigul-server"
            "sigul-bridge"
            "sigul-client-integration"
          )
          for container in "${containers_to_cleanup[@]}"; do
            if docker ps -a --format "{{.Names}}" | \
               grep -q "^${container}$"; then
              echo "Stopping and removing ${container}..."
              docker stop "${container}" >/dev/null 2>&1 || true
              docker rm "${container}" >/dev/null 2>&1 || true
            fi
          done

          # Clean up networks if they exist
          docker network ls --filter "name=sigul" --format "{{.Name}}" | \
            xargs -r docker network rm >/dev/null 2>&1 || true

          # Clean up any test volumes
          docker volume ls --filter "name=sigul" --format "{{.Name}}" | \
            xargs -r docker volume rm >/dev/null 2>&1 || true

          echo "✅ Functional test infrastructure cleanup completed"

  ### Cleanup Sigul Infrastructure ###
  cleanup-infrastructure:
    name: 'Cleanup Infrastructure'
    runs-on: 'ubuntu-latest'
    permissions:
      contents: read
    timeout-minutes: 2
    needs: [functional-tests]
    if: always()
    steps:
      # Load the egress allow-list out-of-band from the
      # organisation's .github repository and publish it as
      # $CONNECTION_ALLOW_LIST for the harden-runner step below.
      # yamllint disable-line rule:line-length
      - uses: lfreleng-actions/harden-runner-block-action@6db537b3e6d060c3287c5a3ce2c28b55b0af330d  # v0.2.1
        with:
          config: '@8f4f0cf83e6a015957e83261ed379fd811fc060e'  # v0.5.1

      # Harden the runner with the just-loaded allow-list.
      - name: 'Harden runner (block)'
        # yamllint disable-line rule:line-length
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: 'block'
          allowed-endpoints: >
            ${{ env.CONNECTION_ALLOW_LIST }}

      - name: 'Cleanup any remaining containers'
        shell: bash
        run: |
          echo 'Performing final cleanup of any remaining containers...'

          # Clean up any containers that might still be running
          containers_to_cleanup=(
            "test-sigul-server"
            "test-sigul-bridge"
            "sigul-client-test"
          )

          for container in "${containers_to_cleanup[@]}"; do
            if docker ps -a --filter "name=${container}" \
              --format "{{.Names}}" | grep -q "^${container}$"; then
              echo "Cleaning up ${container}..."
              docker stop "${container}" || true
              docker rm "${container}" || true
            fi
          done

          # Clean up any volumes or networks if needed
          docker system prune -f --volumes || true

          echo '✅ Infrastructure cleanup completed'

  ### Sigul Deploy Summary ###
  summary:
    name: 'Deploy Summary'
    runs-on: 'ubuntu-latest'
    needs: [
      build-containers,
      publish-ghcr,
      pr-sbom,
      pr-grype,
      functional-tests
    ]
    if: always()
    timeout-minutes: 1
    # yamllint disable rule:line-length
    steps:
      - name: 'Generate deploy summary'
        shell: bash
        env:
          BUILD_RESULT: ${{ needs.build-containers.result }}
          SBOM_RESULT: ${{ needs.pr-sbom.result }}
          GRYPE_RESULT: ${{ needs.pr-grype.result }}
          TESTS_RESULT: ${{ needs.functional-tests.result }}
          PUBLISH_RESULT: ${{ needs.publish-ghcr.result }}
          REGISTRY_NAME: ${{ env.REGISTRY }}
          IMAGE: ${{ env.IMAGE_NAME }}
        run: |
          {
            echo "## Sigul Deploy Summary 🐳"
            echo ""

            echo "### Job Results"
            echo "| Job | Status |"
            echo "|-----|--------|"
            echo "| Build (matrix: amd64 + arm64) |" \
              " ${BUILD_RESULT} |"
            echo "| SBOM (matrix: 3 components) |" \
              " ${SBOM_RESULT} |"
            echo "| Grype (matrix: 3 components) |" \
              " ${GRYPE_RESULT} |"
            echo "| Functional Tests (matrix: amd64 + arm64) |" \
              " ${TESTS_RESULT} |"
            echo ""

            # Note: needs.<job>.result is the *overall* matrix outcome
            # ('success' iff every matrix leg passed).  GitHub does not
            # currently expose per-leg results to a downstream summary
            # job without explicit job outputs, so we report the
            # overall status only and let maintainers click into the
            # individual matrix legs in the UI for per-platform detail.

            echo "### Functional Tests"
            echo "- **Status**: ${TESTS_RESULT}"
            echo "- **Includes**: Integration testing against fresh infrastructure"
            echo ""

            echo "### Supply-chain scan"
            echo "- **SBOM status**: ${SBOM_RESULT}"
            echo "- **Grype status**: ${GRYPE_RESULT}"
            echo "- **Includes**: SPDX SBOM (anchore/sbom-action)" \
              "and Grype vulnerability scan per component image"
            echo "- **Artifacts**: pr-sbom-and-scan-COMPONENT per" \
              "component (SPDX JSON + Grype SARIF/JSON/TXT," \
              "14-day retention)"
            echo "- **Code scanning**: SARIF uploaded under category" \
              "pr-grype-COMPONENT for same-repo PRs; fork PRs fall" \
              "back to the workflow-run artifacts above"
            echo ""

            echo "### GHCR Publishing"
            echo "- **Registry**: ${REGISTRY_NAME}"
            echo "- **Image**: ${IMAGE}"
            echo "- **Status**: ${PUBLISH_RESULT}"
            echo "- **Method**: Pre-built artifacts (no rebuild)"
            echo ""

            if [ "${PUBLISH_RESULT}" = "success" ]; then
              echo "✅ **Optimization Success**: Images were published using " \
                "pre-built artifacts, avoiding duplicate builds!"
            elif [ "${PUBLISH_RESULT}" = "skipped" ]; then
              echo "⏭️ **Publishing Skipped**: " \
              "pull requests cannot publish containers."
            else
              echo "❌ **Publishing Failed**: Check the publish-ghcr job " \
                "logs for details."
            fi
          } >> "$GITHUB_STEP_SUMMARY"
