---
# SPDX-License-Identifier: Apache-2.0
# SPDX-FileCopyrightText: 2026 The Linux Foundation

# Release workflow: build, test, publish, promote.
#
# Triggered by a semver tag push (e.g. `v1.0.0`). The tag must be
# signed and well-formed; the validate step enforces that before
# anything else runs.
#
# Once the tag is validated, this workflow:
#
# 1. Builds all three images (client, server, bridge) for both
#    `linux/amd64` and `linux/arm64`, mirroring the matrix used by
#    build-test.yaml.
# 2. Runs the integration and signing test suites against the
#    freshly-built stack on each architecture. No unverified
#    image ever reaches GHCR.
# 3. Publishes all six images to GHCR as three multi-arch
#    manifests, tagged with the full tag and the major / minor
#    tracks plus `latest`.
# 4. Promotes the matching draft release (created by
#    release-drafter on main pushes) to a published release.

name: 'Release on Tag Push 🚀'

# yamllint disable-line rule:truthy
on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+-*'

permissions: {}

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_BASE: ${{ github.repository }}
  DOCKER_BUILDKIT: '1'
  BUILDKIT_PROGRESS: plain

jobs:
  repository-metadata:
    name: 'Repository Metadata'
    runs-on: 'ubuntu-latest'
    permissions:
      contents: read
      pull-requests: read
    timeout-minutes: 5
    steps:
      # yamllint disable-line rule:line-length
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: 'audit'

      - name: 'Checkout repository'
        # yamllint disable-line rule:line-length
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0

      - name: 'Gather repository metadata'
        id: repo-metadata
        # yamllint disable-line rule:line-length
        uses: lfreleng-actions/repository-metadata-action@ceabcd987d13d7bfefd2372e01eebb0ddac45956  # v0.2.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          github_summary: 'true'
          gerrit_summary: 'false'
          artifact_upload: 'true'
          artifact_formats: 'json'

  ### Step 1: Validate the pushed tag (parallel with repository-metadata) ###
  tag-validate:
    name: 'Validate Tag'
    runs-on: 'ubuntu-24.04'
    permissions:
      contents: read
    timeout-minutes: 3
    outputs:
      # lfreleng-actions/tag-validate-action emits the tag as
      # `tag_name`, not `tag`.  An earlier draft of this workflow
      # bound this output to steps.validate.outputs.tag, which
      # silently evaluated to '' and caused docker push to fail
      # with refs like `bridge:-amd64`.  Bind to the correct
      # underlying output and downstream steps consume the tag
      # via needs.tag-validate.outputs.tag.
      tag: ${{ steps.validate.outputs.tag_name }}
    steps:
      # yamllint disable-line rule:line-length
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: 'audit'

      - name: 'Checkout repository'
        # yamllint disable-line rule:line-length
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: 'Validate tag'
        id: validate
        # yamllint disable-line rule:line-length
        uses: lfreleng-actions/tag-validate-action@461d187a53b5de27b068c2cea5af972c085a4a6a  # v1.0.2
        with:
          token: "${{ secrets.GITHUB_TOKEN }}"
          require_type: 'semver'
          reject_development: true
          # Verify the tag's signing key is registered against the
          # tagger's GitHub account, not just any valid SSH/GPG key.
          require_github: true
          # 'ssh,gpg-unverifiable' matches dependamerge: SSH signatures
          # are fully verified; GPG signatures are accepted as signed
          # even when the action lacks the signer's public key to
          # cryptographically verify them (require_github above still
          # binds the key to the GitHub account).
          require_signed: 'ssh,gpg-unverifiable'

  ### Step 2: Build all three images for both architectures ###
  build-containers:
    name: 'Build: ${{ matrix.component }} (${{ matrix.platform }})'
    # Wait for both prelude jobs - repository-metadata and
    # tag-validate run in parallel, but no expensive build runs
    # unless both pass.
    needs: [repository-metadata, tag-validate]
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
    timeout-minutes: 15
    strategy:
      fail-fast: true  # release: a single failed build aborts the whole release
      matrix:
        # yamllint disable rule:line-length
        include:
          - component: 'client'
            title: 'Sigul Client'
            description: 'Unified Linux Foundation signing infrastructure client'
            platform: 'linux/amd64'
            runner: 'ubuntu-24.04'
          - component: 'client'
            title: 'Sigul Client'
            description: 'Unified Linux Foundation signing infrastructure client'
            platform: 'linux/arm64'
            runner: 'ubuntu-24.04-arm'
          - component: 'server'
            title: 'Sigul Server'
            description: 'Simplified Linux Foundation signing infrastructure server'
            platform: 'linux/amd64'
            runner: 'ubuntu-24.04'
          - component: 'server'
            title: 'Sigul Server'
            description: 'Simplified Linux Foundation signing infrastructure server'
            platform: 'linux/arm64'
            runner: 'ubuntu-24.04-arm'
          - component: 'bridge'
            title: 'Sigul Bridge'
            description: 'Simplified Linux Foundation signing infrastructure bridge'
            platform: 'linux/amd64'
            runner: 'ubuntu-24.04'
          - component: 'bridge'
            title: 'Sigul Bridge'
            description: 'Simplified Linux Foundation signing infrastructure bridge'
            platform: 'linux/arm64'
            runner: 'ubuntu-24.04-arm'
        # yamllint enable rule:line-length
    steps:
      # yamllint disable-line rule:line-length
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: 'audit'

      - name: 'Checkout repository'
        # yamllint disable-line rule:line-length
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: 'Set up Docker Buildx'
        # yamllint disable-line rule:line-length
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5  # v4.1.0

      - name: 'Compute platform identifier'
        id: platform
        shell: bash
        run: |
          platform_id=$(echo "${{ matrix.platform }}" | tr '/' '-')
          echo "id=${platform_id}" >> "$GITHUB_OUTPUT"

      # Generate the full standard OCI label set from the workflow
      # context (org/repo, commit SHA, build time, repo licence, etc).
      # Per-component title and description come from the matrix.
      # The resulting labels are baked into the image at build time
      # and survive the tar export/load cycle that publish-ghcr uses.
      - name: 'Compute OCI image metadata'
        id: meta
        # yamllint disable-line rule:line-length
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9  # v6.1.0
        with:
          images: ghcr.io/${{ github.repository }}/${{ matrix.component }}
          labels: |
            org.opencontainers.image.title=${{ matrix.title }}
            org.opencontainers.image.description=${{ matrix.description }}

      # yamllint disable rule:line-length
      - name: 'Build ${{ matrix.component }} (${{ matrix.platform }})'
        # yamllint disable-line rule:line-length
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf  # v7.2.0
        with:
          context: '.'
          file: 'Dockerfile.${{ matrix.component }}'
          # ARM runners build natively, AMD runners build for amd64;
          # buildx still needs the platforms hint for non-native legs.
          platforms: ${{ matrix.runner == 'ubuntu-24.04-arm' && '' || matrix.platform }}
          tags: |
            ${{ matrix.component }}:${{ steps.platform.outputs.id }}
          labels: ${{ steps.meta.outputs.labels }}
          outputs: |
            type=docker,dest=/tmp/${{ matrix.component }}-${{ steps.platform.outputs.id }}.tar
          push: false
          cache-from: type=gha,scope=release-${{ matrix.component }}-${{ matrix.platform }}-${{ matrix.runner }}
          cache-to: type=gha,mode=max,scope=release-${{ matrix.component }}-${{ matrix.platform }}-${{ matrix.runner }}
      # yamllint enable rule:line-length

      - name: 'Upload ${{ matrix.component }} image artifact'
        # yamllint disable-line rule:line-length
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: ${{ matrix.component }}-${{ steps.platform.outputs.id }}-image
          # yamllint disable-line rule:line-length
          path: /tmp/${{ matrix.component }}-${{ steps.platform.outputs.id }}.tar
          retention-days: 7

  ### Step 3: Functional tests against the freshly-built stack ###
  functional-tests:
    name: 'Tests: ${{ matrix.platform }}'
    needs: [build-containers]
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
    timeout-minutes: 15
    strategy:
      fail-fast: true
      matrix:
        include:
          - platform: 'linux/amd64'
            runner: 'ubuntu-latest'
          - platform: 'linux/arm64'
            runner: 'ubuntu-24.04-arm'
    steps:
      # yamllint disable-line rule:line-length
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: 'audit'

      - name: 'Checkout repository'
        # yamllint disable-line rule:line-length
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: 'Set up Docker Buildx'
        # yamllint disable-line rule:line-length
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5  # v4.1.0

      - name: 'Compute platform identifier'
        id: platform
        shell: bash
        run: |
          platform_id=$(echo "${{ matrix.platform }}" | tr '/' '-')
          echo "id=${platform_id}" >> "$GITHUB_OUTPUT"

      - name: 'Download client image artifact'
        # yamllint disable-line rule:line-length
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: client-${{ steps.platform.outputs.id }}-image
          path: /tmp

      - name: 'Download server image artifact'
        # yamllint disable-line rule:line-length
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: server-${{ steps.platform.outputs.id }}-image
          path: /tmp

      - name: 'Download bridge image artifact'
        # yamllint disable-line rule:line-length
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: bridge-${{ steps.platform.outputs.id }}-image
          path: /tmp

      - name: 'Load images into local Docker daemon'
        shell: bash
        run: |
          set -euo pipefail
          for component in client server bridge; do
              tarball="/tmp/${component}-${{ steps.platform.outputs.id }}.tar"
              echo "Loading ${tarball}"
              docker load --input "${tarball}"
              docker tag "${component}:${{ steps.platform.outputs.id }}" \
                  "${component}-${{ steps.platform.outputs.id }}-image:test"
          done
          docker images | grep -E '(client|server|bridge)-' || true

      - name: 'Deploy Sigul stack'
        shell: bash
        env:
          SIGUL_RUNNER_PLATFORM: ${{ steps.platform.outputs.id }}
        run: ./scripts/deploy-sigul-infrastructure.sh

      # yamllint disable rule:line-length
      - name: 'Setup client for integration tests'
        shell: bash
        env:
          SIGUL_CLIENT_IMAGE: 'client-${{ steps.platform.outputs.id }}-image:test'
        run: |
          set -euo pipefail
          echo '🔧 Setting up client container for integration tests...'

          NETWORK_NAME=$(docker network ls --filter "name=sigul" \
            --format "{{.Name}}" | head -1)
          echo "Using network: ${NETWORK_NAME}"

          docker volume create sigul-docker_sigul_client_nss || true
          docker volume create sigul-docker_sigul_client_config || true

          docker run --rm \
            -v sigul-docker_sigul_client_nss:/target-nss \
            -v sigul-docker_sigul_client_config:/target-config \
            alpine:3.19 \
            sh -c 'chown -R 1000:1000 /target-nss /target-config'

          BRIDGE_NSS_VOLUME=$(docker volume ls --format "{{.Name}}" \
            | grep -E "bridge.*nss|sigul.*bridge.*nss" | head -1)
          echo "Bridge NSS volume: ${BRIDGE_NSS_VOLUME}"

          NSS_PASSWORD=$(cat test-artifacts/nss-password)

          docker run -d --name sigul-client-init \
            --network "${NETWORK_NAME}" \
            --user sigul \
            -v "${BRIDGE_NSS_VOLUME}":/etc/pki/sigul/bridge:ro \
            -v sigul-docker_sigul_client_nss:/etc/pki/sigul/client:rw \
            -v sigul-docker_sigul_client_config:/etc/sigul:rw \
            -e NSS_PASSWORD="${NSS_PASSWORD}" \
            "${SIGUL_CLIENT_IMAGE}" \
            tail -f /dev/null

          sleep 3

          echo "Initializing client certificates..."
          docker exec sigul-client-init /usr/local/bin/init-client-certs.sh

          docker exec --user root sigul-client-init bash -c \
            'cat > /etc/sigul/client.conf << "EOFCONFIG"
          [client]
          bridge-hostname: sigul-bridge.example.org
          bridge-port: 44334
          server-hostname: sigul-server.example.org
          # Default identity for batch-mode requests.  Without this,
          # sigul falls back to getpass.getuser() inside the client
          # container - that resolves to the sigul user, which is not
          # the admin user we created in the server database, so
          # every request would fail AUTHENTICATION_FAILED.
          user-name: admin

          [gnupg]
          gnupg-bin: /usr/bin/gpg2
          gnupg-key-type: RSA
          gnupg-key-length: 4096

          [nss]
          client-cert-nickname: sigul-client-cert
          nss-ca-cert-nickname: sigul-ca
          nss-bridge-cert-nickname: sigul-bridge-cert
          nss-dir: /etc/pki/sigul/client
          nss-password: '"${NSS_PASSWORD}"'
          nss-min-tls: tls1.2
          EOFCONFIG
          '

          docker exec --user root sigul-client-init \
            chown sigul:sigul /etc/sigul/client.conf

          docker stop sigul-client-init
          docker rm sigul-client-init

          echo "✅ Client setup complete"
      # yamllint enable rule:line-length

      - name: 'Run integration tests'
        shell: bash
        env:
          # yamllint disable-line rule:line-length
          SIGUL_CLIENT_IMAGE: 'client-${{ steps.platform.outputs.id }}-image:test'
        run: ./scripts/run-integration-tests.sh --verbose

      - name: 'Run signing test suite'
        shell: bash
        env:
          # yamllint disable-line rule:line-length
          SIGUL_CLIENT_IMAGE: 'client-${{ steps.platform.outputs.id }}-image:test'
        run: ./scripts/run-signing-tests.sh

      - name: 'Tear down stack'
        if: always()
        shell: bash
        run: |
          docker compose -f docker-compose.sigul.yml \
              down -v --remove-orphans || true

  ### Step 4: Publish to GHCR ###
  publish-ghcr:
    name: 'Publish: ${{ matrix.component }}'
    needs: [tag-validate, functional-tests]
    runs-on: 'ubuntu-latest'
    permissions:
      contents: read
      packages: write
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        component: ['client', 'server', 'bridge']
    steps:
      # yamllint disable-line rule:line-length
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: 'audit'

      - name: 'Checkout repository'
        # yamllint disable-line rule:line-length
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: 'Set up Docker Buildx'
        # yamllint disable-line rule:line-length
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5  # v4.1.0

      - name: 'Log in to GitHub Container Registry'
        # yamllint disable-line rule:line-length
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121  # v4.1.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 'Download AMD64 image artifact'
        # yamllint disable-line rule:line-length
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: ${{ matrix.component }}-linux-amd64-image
          path: /tmp

      - name: 'Download ARM64 image artifact'
        # yamllint disable-line rule:line-length
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: ${{ matrix.component }}-linux-arm64-image
          path: /tmp

      - name: 'Compute release tags and labels'
        # Replaces the previous hand-rolled bash that derived major /
        # minor / latest tracks from FULL_TAG. metadata-action's
        # default `flavor: latest=auto` skips the `latest` tag for
        # prerelease tags (e.g. v1.2.3-rc1) just like the previous
        # bash did. The OCI labels that this action also outputs are
        # unused here: the build job already baked the full label
        # set into each per-arch image via metadata-action and those
        # labels survive the tar export/load cycle.
        #
        # Each semver pattern carries
        # `value=${{ needs.tag-validate.outputs.tag }}` so the tag
        # set is derived from the validated tag emitted by the
        # tag-validate job rather than from `github.ref_name`. In
        # practice those are the same string today, but pinning
        # value= here guarantees publish and validation cannot
        # diverge if tag-validate ever canonicalises or rewrites
        # the tag before downstream consumption.
        id: meta
        # yamllint disable-line rule:line-length
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9  # v6.1.0
        with:
          # yamllint disable-line rule:line-length
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_BASE }}/${{ matrix.component }}
          # yamllint disable rule:line-length
          tags: |
            type=semver,pattern=v{{version}},value=${{ needs.tag-validate.outputs.tag }}
            type=semver,pattern=v{{major}}.{{minor}},value=${{ needs.tag-validate.outputs.tag }}
            type=semver,pattern=v{{major}},value=${{ needs.tag-validate.outputs.tag }}
          # yamllint enable rule:line-length

      - name: 'Load platform images from tar artifacts'
        shell: bash
        run: |
          set -euo pipefail
          docker load --input /tmp/${{ matrix.component }}-linux-amd64.tar
          docker load --input /tmp/${{ matrix.component }}-linux-arm64.tar
          docker images | grep '^${{ matrix.component }} ' || true

      - name: 'Push per-arch images and assemble multi-arch index'
        # Push each platform image exactly once under a stable
        # per-arch reference, then use `docker buildx imagetools
        # create` to assemble a single OCI image index per release
        # tag pointing at those two per-arch images. imagetools
        # reads each source image's config to derive its platform
        # entry in the index, so the explicit `manifest annotate`
        # calls the previous implementation needed are no longer
        # required.
        #
        # Per release, this produces (for stable tags v1.2.3):
        #
        #     v1.2.3-amd64, v1.2.3-arm64    (per-arch sources)
        #     v1.2.3, v1.2, v1, latest      (multi-arch indexes)
        #
        # i.e. 2 per-arch images + 4 indexes = 6 registry entries
        # per release per component, vs 12 with the previous
        # per-tag-per-arch push loop.
        shell: bash
        env:
          # yamllint disable-line rule:line-length
          IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_BASE }}/${{ matrix.component }}
          FULL_TAG: ${{ needs.tag-validate.outputs.tag }}
        # yamllint disable rule:line-length
        run: |
          set -euo pipefail

          # Pre-flight: refuse to push if metadata-action produced
          # no tags, or if any computed tag is malformed (ends with
          # ':' which would mean an empty version).
          mapfile -t tags <<< "${{ steps.meta.outputs.tags }}"
          nonempty=()
          for t in "${tags[@]}"; do
              [[ -n "${t}" ]] || continue
              if [[ "${t}" == *: ]]; then
                  echo "::error::Computed tag '${t}' ends with ':' (empty version); refusing to push" >&2
                  exit 1
              fi
              nonempty+=( "${t}" )
          done
          if [[ ${#nonempty[@]} -eq 0 ]]; then
              echo "::error::No release tags produced by docker/metadata-action; refusing to push" >&2
              exit 1
          fi
          echo "Will publish multi-arch indexes under tags:"
          printf '  %s\n' "${nonempty[@]}"

          # Push per-arch images under stable per-arch tags derived
          # from FULL_TAG. These remain in the registry as direct
          # per-arch references and serve as the imagetools inputs.
          amd64_src="${IMAGE}:${FULL_TAG}-amd64"
          arm64_src="${IMAGE}:${FULL_TAG}-arm64"
          docker tag "${{ matrix.component }}:linux-amd64" "${amd64_src}"
          docker tag "${{ matrix.component }}:linux-arm64" "${arm64_src}"
          docker push "${amd64_src}"
          docker push "${arm64_src}"

          # Assemble all public release tags into one multi-arch
          # index per tag, in a single imagetools call. Atomic per
          # tag; the index manifest digest binds both architectures
          # under each public reference.
          tag_args=()
          for t in "${nonempty[@]}"; do
              tag_args+=( --tag "${t}" )
          done
          docker buildx imagetools create \
              "${tag_args[@]}" \
              "${amd64_src}" "${arm64_src}"
          echo "✅ Published multi-arch indexes for ${{ matrix.component }}"
        # yamllint enable rule:line-length

      - name: 'Verify pushed manifests'
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t tags <<< "${{ steps.meta.outputs.tags }}"
          for tag in "${tags[@]}"; do
              [[ -n "${tag}" ]] || continue
              echo "=== ${tag} ==="
              docker buildx imagetools inspect "${tag}"
          done

  ### Step 4b: Sign, attest, SBOM, and vuln-scan each image ###
  sign-attest-scan:
    name: 'Sign+SBOM+Scan: ${{ matrix.component }}'
    needs: [tag-validate, publish-ghcr]
    runs-on: 'ubuntu-latest'
    permissions:
      contents: read
      packages: write
      # cosign keyless signing + attestation predicates use OIDC.
      id-token: write
      # actions/attest-build-provenance + actions/attest-sbom write
      # signed attestations and (with push-to-registry: true) attach
      # them as OCI referrers on the manifest digest.
      attestations: write
      # github/codeql-action/upload-sarif publishes Grype findings
      # to the repository's code-scanning alerts.
      security-events: write
    timeout-minutes: 20
    strategy:
      # Don't short-circuit other components if one's Grype scan
      # finds CVEs at the configured threshold; we want SBOMs and
      # SARIF for every component in a single release run.
      fail-fast: false
      matrix:
        component: ['client', 'server', 'bridge']
    env:
      # 'low' is intentionally aggressive: the bridge and server
      # both handle signing material and the client is consumed
      # widely downstream, so any known-fixable CVE warrants
      # release-time visibility. Set the NO_BLOCK_AUDIT_FAIL repo
      # variable to 'true' to soft-fail (warn but still publish)
      # when a transitive CVE is blocking an urgent release.
      GRYPE_FAIL_ON: 'low'
    steps:
      # yamllint disable-line rule:line-length
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: 'audit'

      - name: 'Set up Docker Buildx'
        # yamllint disable-line rule:line-length
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5  # v4.1.0

      - name: 'Log in to GitHub Container Registry'
        # yamllint disable-line rule:line-length
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121  # v4.1.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 'Resolve multi-arch manifest digest'
        id: ref
        shell: bash
        env:
          # yamllint disable-line rule:line-length
          IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_BASE }}/${{ matrix.component }}
          TAG: ${{ needs.tag-validate.outputs.tag }}
        run: |
          set -euo pipefail
          # The publish-ghcr job uploaded a multi-arch manifest list
          # under <image>:<tag>. Resolve the manifest-list digest so
          # cosign / attest / SBOM all bind to the immutable digest
          # rather than the moving tag.
          digest=$(docker buildx imagetools inspect \
            "${IMAGE}:${TAG}" \
            --format '{{json .Manifest}}' \
            | jq -r '.digest')
          if [[ -z "${digest}" || "${digest}" == "null" ]]; then
            echo "::error::Could not resolve manifest digest" \
              "for ${IMAGE}:${TAG}" >&2
            exit 1
          fi
          echo "Resolved ${IMAGE}:${TAG} -> ${digest}"
          {
            echo "image=${IMAGE}"
            echo "digest=${digest}"
            echo "ref=${IMAGE}@${digest}"
          } >> "$GITHUB_OUTPUT"

      - name: 'Install cosign'
        # yamllint disable-line rule:line-length
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6  # v4.1.2

      - name: 'Sign image (keyless OIDC)'
        env:
          IMAGE_REF: ${{ steps.ref.outputs.ref }}
        run: cosign sign --yes "${IMAGE_REF}"

      - name: 'Attest build provenance'
        # yamllint disable-line rule:line-length
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32  # v4.1.0
        with:
          subject-name: ${{ steps.ref.outputs.image }}
          subject-digest: ${{ steps.ref.outputs.digest }}
          push-to-registry: true
          # Storage records are a newer GitHub artifact-metadata
          # feature that mirrors attestations into the
          # workflow-artifact catalogue. We persist attestations
          # as OCI referrers on the image manifest and via the
          # GitHub attestations API, which is what `gh attestation
          # verify oci://...` (documented in the release notes
          # footer) actually consumes. Disabling storage records
          # avoids `Failed to persist storage record: no artifacts
          # found` warnings and the corresponding
          # `artifact-metadata: write` permission requirement
          # without losing any verification path.
          create-storage-record: false

      - name: 'Generate SPDX SBOM'
        # yamllint disable-line rule:line-length
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610  # v0.24.0
        with:
          image: ${{ steps.ref.outputs.ref }}
          format: spdx-json
          output-file: sbom-${{ matrix.component }}.spdx.json
          # The SBOM action's own artifact upload duplicates our
          # explicit upload-artifact step below; disabling it
          # avoids 'name already exists' failures and keeps all
          # release assets under one consistent naming pattern.
          upload-artifact: false

      - name: 'Attest SBOM'
        # `actions/attest-sbom` was deprecated in favour of the
        # combined `actions/attest` action, which supports SBOM
        # mode automatically when `sbom-path:` is provided. The
        # produced attestation predicate (SPDX) is identical, so
        # this is a drop-in replacement that silences the
        # deprecation warning emitted by attest-sbom.
        # yamllint disable-line rule:line-length
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26  # v4.1.0
        with:
          subject-name: ${{ steps.ref.outputs.image }}
          subject-digest: ${{ steps.ref.outputs.digest }}
          sbom-path: sbom-${{ matrix.component }}.spdx.json
          push-to-registry: true
          # See the rationale on the build-provenance step above:
          # storage records add no verification path that we use
          # and require an additional `artifact-metadata: write`
          # permission; disable them to keep this job's token
          # scopes minimal.
          create-storage-record: false

      - name: 'Install Grype'
        id: grype
        # yamllint disable-line rule:line-length
        uses: anchore/scan-action/download-grype@e1165082ffb1fe366ebaf02d8526e7c4989ea9d2  # v7.4.0
        with:
          cache-db: 'true'

      - name: 'Grype scan SBOM'
        id: grype-scan
        env:
          GRYPE_CMD: ${{ steps.grype.outputs.cmd }}
          COMPONENT: ${{ matrix.component }}
          FAIL_ON: ${{ env.GRYPE_FAIL_ON }}
          NO_BLOCK_AUDIT_FAIL: >-
            ${{ vars.NO_BLOCK_AUDIT_FAIL == 'true' }}
        run: |
          set +e
          "${GRYPE_CMD}" \
            -o "sarif=grype-${COMPONENT}.sarif" \
            -o "json=grype-${COMPONENT}.json" \
            -o "table=grype-${COMPONENT}.txt" \
            --fail-on "${FAIL_ON}" \
            "sbom:sbom-${COMPONENT}.spdx.json"
          grype_exit=$?
          set -e

          echo "--- Grype scan results (${COMPONENT}) ---"
          if [[ -f "grype-${COMPONENT}.txt" ]]; then
            cat "grype-${COMPONENT}.txt"
          else
            echo "No table output produced"
          fi

          # Grype exits 2 when matches at/above --fail-on were
          # found. Any other non-zero exit means grype itself
          # failed and we must surface that.
          if [[ "${grype_exit}" == "0" ]]; then
            echo "No vulnerabilities at or above '${FAIL_ON}'"
            exit 0
          fi
          if [[ "${grype_exit}" != "2" ]]; then
            echo "::error::Grype exited with code ${grype_exit}"
            exit "${grype_exit}"
          fi

          if [[ "${NO_BLOCK_AUDIT_FAIL}" == "true" ]]; then
            echo "::warning::${COMPONENT}: Grype found findings" \
              "at or above '${FAIL_ON}', but NO_BLOCK_AUDIT_FAIL" \
              "is set so the release will proceed."
            exit 0
          fi
          echo "::error::${COMPONENT}: Grype found vulnerabilities" \
            "at or above '${FAIL_ON}'. See the table above."
          exit 1

      - name: 'Upload Grype SARIF to code scanning'
        if: always()
        # continue-on-error: a transient SARIF upload failure must
        # not block the release; the SARIF file is also attached
        # to the release as a downloadable asset.
        continue-on-error: true
        # yamllint disable-line rule:line-length
        uses: github/codeql-action/upload-sarif@9e0d7b8d25671d64c341c19c0152d693099fb5ba  # v4.35.5
        with:
          sarif_file: grype-${{ matrix.component }}.sarif
          category: grype-${{ matrix.component }}

      - name: 'Upload SBOM and Grype reports as workflow artifact'
        if: always()
        # yamllint disable-line rule:line-length
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: sbom-and-scan-${{ matrix.component }}
          path: |
            sbom-${{ matrix.component }}.spdx.json
            grype-${{ matrix.component }}.sarif
            grype-${{ matrix.component }}.json
            grype-${{ matrix.component }}.txt
          retention-days: 90
          if-no-files-found: warn

      - name: 'Grype Markdown summary'
        if: always()
        env:
          COMPONENT: ${{ matrix.component }}
        run: |
          # Render a Markdown table of Grype matches into the job
          # step summary. CVE data is sourced from the JSON output
          # (jq-parsed so multi-word cells cannot break the table
          # column layout).
          json_file="grype-${COMPONENT}.json"
          {
            echo "## Grype scan: ${COMPONENT}"
            echo ""
            if [[ ! -f "${json_file}" ]]; then
              echo "No scan results available."
              exit 0
            fi
            match_count=$(jq '.matches | length' "${json_file}")
            if [[ "${match_count}" == "0" ]]; then
              echo "No vulnerabilities at or above the configured" \
                "severity threshold."
              exit 0
            fi
            echo "Found ${match_count} Grype record(s)."
            echo ""
            echo "| Package | Installed | Fixed In | Type |" \
              "Vulnerability | Severity | EPSS | Risk |"
            echo "| --- | --- | --- | --- | --- | --- | --- | --- |"
            jq -r '
              def esc: tostring | gsub("\\|"; "\\|");
              def round2: (. * 100 | round) / 100;
              def epss_pct:
                ( .vulnerability.epss // [] ) as $e
                | if ($e | length) == 0 then "-"
                  else ( $e[0].epss // 0 ) as $p
                    | if $p == 0 then "0%"
                      elif ($p * 100) < 0.01 then "<0.01%"
                      else ( ($p * 100) | round2 | tostring
                             + "%" ) end
                  end;
              def risk_fmt:
                .vulnerability.risk
                | if . == null then "-"
                  elif type == "number" then
                    (round2 | tostring)
                  else (. | tostring) end;
              .matches[] |
              [ (.artifact.name // "-" | esc),
                (.artifact.version // "-" | esc),
                ( ( .vulnerability.fix.versions // [] )
                  | if length == 0 then "-"
                    else join(", ") end | esc ),
                (.artifact.type // "-" | esc),
                (.vulnerability.id // "-" | esc),
                (.vulnerability.severity // "-" | esc),
                epss_pct,
                risk_fmt
              ] | "| " + join(" | ") + " |"
            ' "${json_file}"
          } >> "$GITHUB_STEP_SUMMARY"

  ### Step 4c: Attach SBOM + Grype reports to draft release ###
  release-attach:
    name: 'Attach Release Assets'
    needs: [tag-validate, sign-attest-scan]
    # Run even when sign-attest-scan fails: SBOM and Grype reports
    # are most valuable on a failing release because they explain
    # *why* it failed. The upload step below no-ops gracefully
    # when no artifacts were produced, and promote-release still
    # waits on sign-attest-scan, so a failed scan leaves the
    # draft un-promoted regardless of release-attach's outcome.
    if: >-
      always() && needs.tag-validate.result == 'success'
    runs-on: 'ubuntu-24.04'
    permissions:
      contents: write
    timeout-minutes: 5
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      TAG: ${{ needs.tag-validate.outputs.tag }}
      # gh CLI commands in this job need an explicit `--repo`
      # because we intentionally skip `actions/checkout` (see
      # comment below). Hoist the repository slug into env so
      # every step uses the same value.
      REPO: ${{ github.repository }}
    steps:
      # yamllint disable-line rule:line-length
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: 'audit'

      # No checkout step: this job only touches the GitHub Releases
      # API and downloaded artifacts; nothing reads from the
      # workspace, so a checkout would just waste runtime and
      # broaden the credential-exposure surface for no benefit.
      # Without a checkout, however, the `gh` CLI cannot infer
      # the repository from a local git remote, so every `gh
      # release ...` invocation below passes `--repo "${REPO}"`
      # explicitly.

      - name: 'Download SBOMs + Grype reports'
        # Tolerate runs where no sbom-and-scan-* artifacts were
        # produced (e.g. sign-attest-scan failed before the
        # upload-artifact step in any matrix entry). The next step
        # checks for and gracefully no-ops on an empty asset set,
        # but only if this step is allowed to succeed without
        # files.
        continue-on-error: true
        # yamllint disable-line rule:line-length
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          path: release-assets
          pattern: sbom-and-scan-*
          merge-multiple: true

      - name: 'Upload SBOMs and Grype reports to release'
        shell: bash
        run: |
          set -euo pipefail
          # Defensive: when the download step finds zero matching
          # artifacts it may skip directory creation entirely, in
          # which case `find` below would exit non-zero under
          # `set -e`. Ensure the directory exists so `find` always
          # has something to walk, then no-op cleanly on an empty
          # asset set.
          mkdir -p release-assets
          mapfile -t assets < <(find release-assets -type f)
          if [[ "${#assets[@]}" -eq 0 ]]; then
            echo "::warning::No release assets found to upload"
            exit 0
          fi
          gh release upload "${TAG}" "${assets[@]}" \
            --repo "${REPO}" --clobber

      - name: 'Append verification footer to release notes'
        # Only stamp the footer (with its cosign verify / gh
        # attestation verify guidance) when sign-attest-scan
        # actually ran. If publish-ghcr failed and the scan job
        # was skipped, no signatures or attestations exist and
        # the footer's claims would be false. A scan that ran
        # and failed still produced some signatures/attestations
        # for some matrix entries, so partial-failure runs are
        # treated as 'footer-worthy' — verification just won't
        # succeed for the missing components.
        if: needs.sign-attest-scan.result != 'skipped'
        shell: bash
        env:
          REPO: ${{ github.repository }}
          REGISTRY: ${{ env.REGISTRY }}
          IMAGE_BASE: ${{ env.IMAGE_BASE }}
        run: |
          set -euo pipefail
          # Sentinel makes the footer idempotent across re-runs:
          # any prior footer is stripped and rewritten in-place.
          sentinel='<!-- sigul release verification footer -->'
          existing=$(gh release view "${TAG}" \
            --repo "${REPO}" --json body --jq .body)
          # SC2295: quote the inner expansion so the sentinel is
          # treated literally rather than as a glob pattern.
          head_body="${existing%%"${sentinel}"*}"

          imgbase="${REGISTRY}/${IMAGE_BASE}"

          footer=$(cat <<EOF
          ${sentinel}

          ---

          ## Container images

          Three multi-arch (linux/amd64 + linux/arm64) images are
          published to GHCR for this release:

          - \`${imgbase}/client:${TAG}\`
          - \`${imgbase}/server:${TAG}\`
          - \`${imgbase}/bridge:${TAG}\`

          Each image is cosign-signed (keyless via GitHub OIDC) and
          ships with a SLSA build-provenance attestation and an
          SPDX SBOM attestation, all attached to the image
          manifest via the OCI referrers API.

          ## Verify the signatures

          The signing identity is bound to this exact workflow file
          and the release tag. Pin both so any other workflow on
          this repository (or a future workflow file rename) cannot
          satisfy the verification.

          \`\`\`sh
          ident="https://github.com/${REPO}/.github/workflows/release.yaml@refs/tags/${TAG}"
          for c in client server bridge; do
            cosign verify "${imgbase}/\${c}:${TAG}" \\
              --certificate-identity "\${ident}" \\
              --certificate-oidc-issuer \\
                https://token.actions.githubusercontent.com
          done
          \`\`\`

          ## Verify the build provenance

          \`\`\`sh
          for c in client server bridge; do
            gh attestation verify \\
              "oci://${imgbase}/\${c}:${TAG}" \\
              --repo ${REPO}
          done
          \`\`\`

          ## Inspect the SBOM

          \`\`\`sh
          gh attestation verify \\
            "oci://${imgbase}/client:${TAG}" \\
            --repo ${REPO} \\
            --predicate-type https://spdx.dev/Document
          cosign download attestation \\
            "${imgbase}/client:${TAG}" \\
            --predicate-type https://spdx.dev/Document \\
            | jq -r '.payload | @base64d | fromjson | .predicate' \\
            > sbom-client.spdx.json
          \`\`\`

          The raw SPDX SBOMs and Grype scan reports for all three
          components are attached to this release as assets, and
          the SARIF results have been uploaded to the repository's
          code-scanning alerts.
          EOF
          )

          printf '%s\n%s\n' "${head_body}" "${footer}" \
            | gh release edit "${TAG}" \
                --repo "${REPO}" --notes-file -

  ### Step 5: Promote draft release ###
  promote-release:
    name: 'Promote Draft Release'
    needs: [tag-validate, publish-ghcr, sign-attest-scan, release-attach]
    runs-on: 'ubuntu-24.04'
    permissions:
      contents: write
    timeout-minutes: 5
    steps:
      # yamllint disable-line rule:line-length
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: 'audit'

      - name: 'Checkout repository'
        # yamllint disable-line rule:line-length
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: 'Decide whether release is pre-release'
        id: release-kind
        shell: bash
        env:
          TAG: ${{ needs.tag-validate.outputs.tag }}
        run: |
          set -euo pipefail
          echo "TAG=${TAG}"
          if [[ -z "${TAG}" ]]; then
              echo "::error::TAG is empty - refusing to promote release" >&2
              exit 1
          fi
          base="${TAG#v}"
          case "${base}" in
              *-*) is_prerelease=true ;;
              *) is_prerelease=false ;;
          esac
          echo "is_prerelease=${is_prerelease}" >> "$GITHUB_OUTPUT"
          echo "Release ${TAG} is_prerelease=${is_prerelease}"

      - name: 'Promote draft release'
        # yamllint disable-line rule:line-length
        uses: lfreleng-actions/draft-release-promote-action@cd7cf442875ecaea5dbb070d0de94f21ece107c8  # v0.1.3
        with:
          token: "${{ secrets.GITHUB_TOKEN }}"
          tag: "${{ needs.tag-validate.outputs.tag }}"
          # Only the latest non-prerelease bump should claim the
          # 'latest' badge.
          latest: "${{ steps.release-kind.outputs.is_prerelease == 'false' }}"

  ### Step 6: Final summary ###
  summary:
    name: 'Release Summary'
    # repository-metadata intentionally not listed: the summary
    # script does not reference its result, and promote-release
    # transitively requires tag-validate which runs in parallel
    # with repository-metadata, so summary already runs after both
    # prelude jobs in practice.
    needs:
      - tag-validate
      - build-containers
      - functional-tests
      - publish-ghcr
      - sign-attest-scan
      - release-attach
      - promote-release
    runs-on: 'ubuntu-latest'
    if: always()
    timeout-minutes: 1
    steps:
      - name: 'Build summary'
        shell: bash
        env:
          TAG: ${{ needs.tag-validate.outputs.tag }}
          STATUS: ${{ needs.promote-release.result }}
          R_TAG: ${{ needs.tag-validate.result }}
          R_BUILD: ${{ needs.build-containers.result }}
          R_TESTS: ${{ needs.functional-tests.result }}
          R_PUBLISH: ${{ needs.publish-ghcr.result }}
          R_SCAN: ${{ needs.sign-attest-scan.result }}
          R_ATTACH: ${{ needs.release-attach.result }}
          R_PROMOTE: ${{ needs.promote-release.result }}
        run: |
          {
              echo "# Release ${TAG}"
              echo ""
              echo "| Stage | Result |"
              echo "| ----- | ------ |"
              echo "| Tag validation | ${R_TAG} |"
              echo "| Image builds | ${R_BUILD} |"
              echo "| Functional tests | ${R_TESTS} |"
              echo "| GHCR publish | ${R_PUBLISH} |"
              echo "| Sign + SBOM + Grype | ${R_SCAN} |"
              echo "| Release assets | ${R_ATTACH} |"
              echo "| Release promote | ${R_PROMOTE} |"
              echo ""
              if [[ "${STATUS}" == "success" ]]; then
                  echo "## ✅ Release published"
                  echo ""
                  echo "Pull with:"
                  echo ""
                  echo "\`\`\`"
                  repo="${{ github.repository }}"
                  echo "docker pull ghcr.io/${repo}/client:${TAG}"
                  echo "docker pull ghcr.io/${repo}/server:${TAG}"
                  echo "docker pull ghcr.io/${repo}/bridge:${TAG}"
                  echo "\`\`\`"
              else
                  echo "## ❌ Release did not complete"
              fi
          } >> "$GITHUB_STEP_SUMMARY"
