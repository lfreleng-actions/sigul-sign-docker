# SPDX-FileCopyrightText: 2025 The Linux Foundation

name: "sigul-docker"
description: "Sign artifacts with Sigul"

inputs:
  sign-type:
    description: "Either 'sign-data' or 'sign-git-tag'"
    required: false
    default: "sign-data"
  sign-object:
    description: "File or git tag to sign"
    required: true
  sigul-conf:
    description: >-
      Body of the Sigul client configuration file (client.conf)
    required: true
  sigul-key-name:
    description: "The key name on the server to utilize"
    required: true
  sigul-pass:
    description: "Passphrase for the Sigul key (also used to decrypt sigul-pki)"
    required: true
  sigul-pki:
    description: >-
      Client PKI material: a tar.xz archive containing the .sigul/
      directory, GPG-encrypted with sigul-pass.  May be supplied raw or
      base64-encoded; the entrypoint auto-detects.
    required: true
  gh-user:
    description: "GitHub user for pushing signed tags"
    required: false
  gh-key:
    description: "GitHub API key for pushing signed tags"
    required: false
  sigul-mock-mode:
    description: "Mock mode testing (operates without a Sigul server)"
    required: false
    default: "false"

runs:
  using: "composite"
  steps:
    - name: "Set GitHub user default"
      id: gh-user
      shell: bash
      env:
        INPUT_GH_USER: ${{ inputs.gh-user }}
        DEFAULT_GH_USER: ${{ github.actor }}
      run: |
        if [[ -z "${INPUT_GH_USER}" ]]; then
          echo "user=${DEFAULT_GH_USER}" >> "$GITHUB_OUTPUT"
        else
          echo "user=${INPUT_GH_USER}" >> "$GITHUB_OUTPUT"
        fi

    - name: "Detect platform architecture"
      id: platform
      shell: bash
      run: |
        # Detect the current platform architecture
        ARCH=$(uname -m)
        case "$ARCH" in
          x86_64)
            PLATFORM="linux/amd64"
            PLATFORM_ID="linux-amd64"
            ;;
          aarch64|arm64)
            PLATFORM="linux/arm64"
            PLATFORM_ID="linux-arm64"
            ;;
          *)
            echo "❌ Unsupported architecture: $ARCH"
            exit 1
            ;;
        esac
        echo "platform=$PLATFORM" >> "$GITHUB_OUTPUT"
        echo "platform-id=$PLATFORM_ID" >> "$GITHUB_OUTPUT"
        echo "Detected platform: $PLATFORM ($PLATFORM_ID)"

    - name: "Build sigul signing container"
      shell: bash
      env:
        PLATFORM: ${{ steps.platform.outputs.platform }}
        PLATFORM_ID: ${{ steps.platform.outputs.platform-id }}
        ACTION_PATH: ${{ github.action_path }}
      run: |
        CLIENT_IMAGE="client-${PLATFORM_ID}-image"
        CLIENT_TAG="client-${PLATFORM_ID}-image:${PLATFORM_ID}"
        CLIENT_ACTION_TAG="client-${PLATFORM_ID}-image:action"

        # Check if the container image already exists
        if docker images --format "table {{.Repository}}:{{.Tag}}" |\
          grep -q "${CLIENT_TAG}"; then
          echo "Docker image '${CLIENT_TAG}' already exists"
          echo "Tagging as '${CLIENT_ACTION_TAG}'"
          docker tag "${CLIENT_TAG}" "${CLIENT_ACTION_TAG}"
        elif docker images --format "table {{.Repository}}:{{.Tag}}" |\
          grep -q "${CLIENT_ACTION_TAG}"; then
          echo "Docker image '${CLIENT_ACTION_TAG}' already exists"
          echo "Skipping build"
        else
          echo "Docker image not found, building new image for ${PLATFORM}"
          docker build --platform "${PLATFORM}" \
            -f "${ACTION_PATH}/Dockerfile.client" \
            -t "${CLIENT_ACTION_TAG}" "${ACTION_PATH}"
        fi

    - name: "Run sigul signing container"
      shell: bash
      env:
        PLATFORM: ${{ steps.platform.outputs.platform }}
        PLATFORM_ID: ${{ steps.platform.outputs.platform-id }}
        GH_USER: ${{ steps.gh-user.outputs.user }}
        SIGN_TYPE: ${{ inputs.sign-type }}
        SIGN_OBJECT: ${{ inputs.sign-object }}
        SIGUL_CONF: ${{ inputs.sigul-conf }}
        SIGUL_KEY_NAME: ${{ inputs.sigul-key-name }}
        SIGUL_PASS: ${{ inputs.sigul-pass }}
        SIGUL_PKI: ${{ inputs.sigul-pki }}
        GH_KEY: ${{ inputs.gh-key }}
        SIGUL_MOCK_MODE: ${{ inputs.sigul-mock-mode }}
      run: |
        docker run --rm --platform "${PLATFORM}" \
          -e "SIGN_TYPE=${SIGN_TYPE}" \
          -e "SIGN_OBJECT=${SIGN_OBJECT}" \
          -e "SIGUL_CONF=${SIGUL_CONF}" \
          -e "SIGUL_KEY_NAME=${SIGUL_KEY_NAME}" \
          -e "SIGUL_PASS=${SIGUL_PASS}" \
          -e "SIGUL_PKI=${SIGUL_PKI}" \
          -e "GH_USER=${GH_USER}" \
          -e "GH_KEY=${GH_KEY}" \
          -e "SIGUL_MOCK_MODE=${SIGUL_MOCK_MODE}" \
          -e "GITHUB_WORKSPACE=${GITHUB_WORKSPACE}" \
          -e "GITHUB_REPOSITORY=${GITHUB_REPOSITORY}" \
          -v "${GITHUB_WORKSPACE}:${GITHUB_WORKSPACE}" \
          -w "${GITHUB_WORKSPACE}" \
          "client-${PLATFORM_ID}-image:action"
